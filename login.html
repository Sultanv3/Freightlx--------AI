<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>تسجيل الدخول — FREIGHTLX</title>
<link rel="icon" href="/assets/logo/color-logo.svg" type="image/svg+xml">
<meta http-equiv="refresh" content="0; url=/?login=1">
<style>
  body {
    margin: 0;
    min-height: 100vh;
    background: linear-gradient(180deg, #050E18 0%, #071C2C 100%);
    color: rgba(244,247,250,.85);
    font-family: 'IBM Plex Sans Arabic', system-ui, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
  }
  .spinner {
    width: 44px; height: 44px;
    border: 3px solid rgba(57, 198, 255, 0.18);
    border-top-color: #39C6FF;
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .msg { font-size: 14px; color: rgba(244,247,250,.62); }
  a {
    color: #39C6FF; text-decoration: none; font-weight: 600;
    padding: 10px 18px; border: 1px solid rgba(57, 198, 255, .28);
    border-radius: 10px; transition: all .2s;
  }
  a:hover { background: rgba(10, 132, 255, .12); border-color: rgba(57, 198, 255, .5); }
</style>
</head>
<body>
  <div class="spinner"></div>
  <div class="msg">يتم تحويلك لتسجيل الدخول...</div>
  <a href="/?login=1">المتابعة الآن →</a>
<script>
  // Redirect immediately to home with login flag
  window.location.replace('/?login=1');
</script>
</body>
</html>
