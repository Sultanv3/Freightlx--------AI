<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>طلب عروض الشحن — FREIGHTLX</title>
<script>window.FLX_API_BASE = '/api/v1';</script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/flx-dark-theme.css">
<style>
:root {
  --brand: #0F2C4D;
  --brand-2: #1E5BA8;
  --accent: #06B6D4;
  --bg: #F6F9FC;
  --surface: #FFFFFF;
  --line: #E6ECF3;
  --line-2: #F1F5F9;
  --text: #0F172A;
  --text-2: #475569;
  --text-3: #94A3B8;
  --success: #047857;
  --success-bg: #ECFDF5;
  --warn: #92400E;
  --warn-bg: #FEF3C7;
  --gold: #D97706;
  --gold-grad: linear-gradient(135deg, #FBBF24 0%, #F59E0B 100%);
  --fast-grad: linear-gradient(135deg, #06B6D4 0%, #0EA5E9 100%);
}
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--bg); }
body {
  font-family: 'SF Pro Display', 'Segoe UI', 'Tahoma', system-ui, sans-serif;
  color: var(--text); line-height: 1.55; min-height: 100vh;
  -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
}
.container { max-width: 1240px; margin: 0 auto; padding: 24px; }

/* ───── Header ───── */
header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 0 20px; gap: 16px;
}
header h1 {
  font-size: 22px; font-weight: 800; color: var(--brand);
  display: flex; align-items: center; gap: 10px; letter-spacing: -0.4px;
}
header h1 .icon {
  width: 36px; height: 36px; border-radius: 10px;
  background: linear-gradient(135deg, var(--brand), var(--brand-2));
  display: flex; align-items: center; justify-content: center; color: white; font-size: 18px;
}
header nav { display: flex; gap: 10px; }
header nav a {
  color: var(--text-2); text-decoration: none; font-weight: 600; font-size: 14px;
  padding: 8px 14px; border-radius: 999px; transition: all 0.2s;
}
header nav a:hover { background: var(--surface); color: var(--brand); }

/* ───── Hero stats ───── */
.hero-stats {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 12px; margin-bottom: 24px;
}
.stat {
  background: var(--surface); border: 1px solid var(--line);
  border-radius: 14px; padding: 14px 16px;
  display: flex; align-items: center; gap: 12px;
}
.stat-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; background: var(--line-2); }
.stat-icon.blue { background: #EFF6FF; color: #1D4ED8; }
.stat-icon.green { background: var(--success-bg); color: var(--success); }
.stat-icon.amber { background: var(--warn-bg); color: var(--warn); }
.stat-icon.cyan { background: #ECFEFF; color: #0E7490; }
.stat-num { font-size: 18px; font-weight: 800; color: var(--text); font-variant-numeric: tabular-nums; }
.stat-lbl { font-size: 12px; color: var(--text-3); font-weight: 500; }

/* ───── Card ───── */
.card {
  background: var(--surface); border-radius: 18px; padding: 22px;
  box-shadow: 0 1px 3px rgba(15,23,42,0.04), 0 8px 32px rgba(15,23,42,0.04);
  border: 1px solid var(--line); margin-bottom: 16px;
}

/* ───── Mode pills ───── */
.mode-row { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }
.mode-btn {
  padding: 9px 20px; border-radius: 999px; border: 1.5px solid var(--line);
  background: white; cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 600;
  color: var(--text-2); transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px;
}
.mode-btn.active {
  background: var(--brand); color: white; border-color: var(--brand);
  box-shadow: 0 4px 12px rgba(15, 44, 77, 0.2);
}
.mode-btn:not(.active):hover { border-color: var(--brand); color: var(--brand); }
.mode-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.mode-btn .soon { font-size: 10px; opacity: 0.7; }

/* ───── Form ───── */
.field-label {
  display: flex; align-items: center; gap: 6px;
  font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 8px;
}
.field-label .req { color: #DC2626; }
.field-label .hint { font-weight: 500; color: var(--text-3); font-size: 11px; }

.port-row {
  display: grid; grid-template-columns: 1fr 56px 1fr;
  align-items: end; gap: 12px; margin-bottom: 20px;
}
@media (max-width: 720px) {
  .port-row { grid-template-columns: 1fr; }
  .port-row .swap-wrap { display: none; }
}

.port-input { position: relative; }
.port-input input[type=text] {
  width: 100%; padding: 14px 16px; border: 1.5px solid var(--line);
  border-radius: 14px; font-size: 14px; font-family: inherit; background: white;
  color: var(--text); transition: all 0.2s;
}
.port-input input[type=text]:focus {
  outline: none; border-color: var(--brand-2);
  box-shadow: 0 0 0 4px rgba(30, 91, 168, 0.12);
}
.port-input input[type=text]::placeholder { color: var(--text-3); }
.port-input.selected input[type=text] { border-color: var(--success); background: #F0FDF4; }

.port-suggestions {
  position: absolute; top: calc(100% + 6px); inset-inline: 0; z-index: 50;
  background: white; border: 1px solid var(--line); border-radius: 14px;
  box-shadow: 0 16px 48px rgba(15, 23, 42, 0.15);
  max-height: 320px; overflow-y: auto; display: none;
}
.port-suggestions.show { display: block; animation: dropIn 0.18s ease-out; }
@keyframes dropIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
.port-suggestions .group-label {
  font-size: 10px; font-weight: 800; color: var(--text-3); padding: 10px 14px 4px;
  text-transform: uppercase; letter-spacing: 0.8px;
}
.port-suggestions .item {
  padding: 10px 14px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; gap: 12px; font-size: 14px;
  transition: background 0.1s;
}
.port-suggestions .item:hover, .port-suggestions .item.active { background: var(--line-2); }
.port-suggestions .item .left { display: flex; align-items: center; gap: 10px; }
.port-suggestions .item .flag { font-size: 18px; }
.port-suggestions .item .name { font-weight: 600; color: var(--text); }
.port-suggestions .item .country { font-size: 12px; color: var(--text-3); }
.port-suggestions .item .code {
  font-family: 'SF Mono', monospace; font-size: 11px; color: var(--text-2);
  background: var(--line-2); padding: 3px 8px; border-radius: 6px; font-weight: 700;
}
.port-suggestions .item.empty { color: var(--text-3); text-align: center; padding: 18px; cursor: default; }

.swap-wrap { display: flex; align-items: center; justify-content: center; padding-bottom: 4px; }
.swap {
  width: 44px; height: 44px; border-radius: 50%; background: white;
  border: 1.5px solid var(--line); display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); font-size: 18px; color: var(--brand-2);
}
.swap:hover { background: var(--brand-2); color: white; border-color: var(--brand-2); transform: rotate(180deg) scale(1.05); }

/* ───── Containers ───── */
.containers-section { margin-bottom: 20px; }
.container-row {
  display: grid; grid-template-columns: 1fr 110px 44px; gap: 10px;
  margin-bottom: 8px; align-items: center;
}
.container-row select, .container-row input {
  padding: 13px 14px; border: 1.5px solid var(--line);
  border-radius: 12px; font-size: 14px; font-family: inherit; background: white; color: var(--text);
  transition: border-color 0.15s;
}
.container-row select:focus, .container-row input:focus { outline: none; border-color: var(--brand-2); }
.container-row .ct-qty { text-align: center; font-weight: 700; font-variant-numeric: tabular-nums; }
.remove-btn {
  width: 44px; height: 44px; border-radius: 12px; border: 1.5px solid #FEE2E2;
  background: #FEF2F2; color: #DC2626; cursor: pointer; font-size: 16px;
  transition: all 0.15s;
}
.remove-btn:hover:not(:disabled) { background: #FECACA; }
.remove-btn:disabled { opacity: 0.35; cursor: not-allowed; }
.add-btn {
  padding: 10px 16px; border-radius: 12px; border: 1.5px dashed var(--line);
  background: transparent; color: var(--brand-2); cursor: pointer;
  font-family: inherit; font-size: 13px; font-weight: 700;
  display: inline-flex; align-items: center; gap: 6px; transition: all 0.15s;
}
.add-btn:hover { border-color: var(--brand-2); background: #EFF6FF; }

/* ───── Cargo type ───── */
.cargo-row { display: flex; align-items: center; gap: 10px; margin-bottom: 22px; flex-wrap: wrap; }
.cargo-row .label-block { display: flex; align-items: center; gap: 6px; min-width: 130px; }
.cargo-row select {
  flex: 1; min-width: 240px; padding: 13px 14px; border: 1.5px solid var(--line);
  border-radius: 12px; font-size: 14px; font-family: inherit; background: white; color: var(--text);
}
.cargo-row select:focus { outline: none; border-color: var(--brand-2); }

/* ───── Submit ───── */
.submit-btn {
  width: 100%; padding: 16px; margin-top: 6px;
  background: linear-gradient(95deg, var(--brand) 0%, var(--brand-2) 60%, var(--accent) 100%);
  color: white; border: none; border-radius: 14px;
  font-family: inherit; font-size: 16px; font-weight: 800; cursor: pointer;
  box-shadow: 0 6px 20px rgba(30, 91, 168, 0.25); transition: all 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  letter-spacing: 0.2px; position: relative; overflow: hidden;
}
.submit-btn:hover { transform: translateY(-1px); box-shadow: 0 10px 28px rgba(30, 91, 168, 0.35); }
.submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

/* ───── Status ───── */
#status {
  padding: 12px 16px; border-radius: 12px; margin-bottom: 14px;
  font-size: 14px; display: none; font-weight: 600; align-items: center; gap: 8px;
}
#status.loading { background: #DBEAFE; color: #1E40AF; display: flex; }
#status.success { background: var(--success-bg); color: var(--success); display: flex; }
#status.error { background: #FEE2E2; color: #B91C1C; display: flex; }
.spinner {
  width: 16px; height: 16px;
  border: 2px solid rgba(255,255,255,0.3); border-top-color: currentColor;
  border-radius: 50%; animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ───── Loading skeleton ───── */
.skeleton-rows { display: flex; flex-direction: column; gap: 12px; }
.skeleton-row {
  background: white; border-radius: 16px; height: 110px; padding: 18px;
  display: flex; gap: 18px; align-items: center; border: 1px solid var(--line);
  position: relative; overflow: hidden;
}
.skeleton-row::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
  animation: shimmer 1.5s infinite;
}
@keyframes shimmer { from { transform: translateX(-100%); } to { transform: translateX(100%); } }
.sk-box { background: var(--line-2); border-radius: 8px; }
.sk-logo { width: 100px; height: 50px; }
.sk-text { flex: 1; display: flex; flex-direction: column; gap: 8px; }
.sk-line { height: 12px; border-radius: 6px; background: var(--line-2); }
.sk-line.short { width: 40%; }
.sk-line.medium { width: 70%; }
.sk-price { width: 110px; height: 36px; }

/* ───── Results bar ───── */
.results-bar {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 16px; gap: 16px; flex-wrap: wrap;
}
.results-bar h2 { font-size: 20px; font-weight: 800; color: var(--text); letter-spacing: -0.3px; }
.results-bar .summary { font-size: 13px; color: var(--text-2); margin-top: 2px; }
.sort-bar { display: flex; gap: 6px; background: var(--surface); padding: 4px; border-radius: 999px; border: 1px solid var(--line); }
.sort-btn {
  padding: 7px 16px; font-size: 13px; border-radius: 999px;
  border: none; background: transparent; cursor: pointer; font-family: inherit; font-weight: 600;
  color: var(--text-2); transition: all 0.15s;
}
.sort-btn.active { background: var(--brand); color: white; }

/* ───── Horizontal Offer Row ───── */
.offers { display: flex; flex-direction: column; gap: 12px; }

.offer {
  position: relative; background: var(--surface); border-radius: 18px;
  border: 1.5px solid var(--line); overflow: hidden;
  box-shadow: 0 1px 3px rgba(15,23,42,0.03), 0 4px 16px rgba(15,23,42,0.03);
  transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.25s, border-color 0.2s;
  animation: rowIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) backwards;
}
@keyframes rowIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.offer:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(15,23,42,0.06), 0 18px 40px rgba(15,23,42,0.10);
  border-color: var(--brand-2);
}
.offer.featured { border-color: #FCD34D; box-shadow: 0 0 0 1px #FCD34D, 0 8px 24px rgba(245, 158, 11, 0.12); }
.offer.fastest { border-color: #67E8F9; box-shadow: 0 0 0 1px #67E8F9, 0 8px 24px rgba(34, 211, 238, 0.12); }

.offer-ribbon {
  position: absolute; top: -1px; inset-inline-start: 20px;
  font-size: 10px; font-weight: 800; padding: 5px 12px;
  letter-spacing: 0.6px; text-transform: uppercase;
  border-radius: 0 0 8px 8px; color: white; z-index: 2;
}
.offer-ribbon.best { background: var(--gold-grad); }
.offer-ribbon.fast { background: var(--fast-grad); }

.offer-body {
  display: grid;
  grid-template-columns: 140px 1fr auto auto;
  gap: 24px; align-items: center;
  padding: 22px 22px 22px 22px;
}
@media (max-width: 900px) {
  .offer-body { grid-template-columns: 100px 1fr; gap: 14px 16px; padding: 16px; }
  .offer-body .col-route, .offer-body .col-price-action { grid-column: 1 / -1; }
}

/* Logo column */
.col-logo {
  background: var(--line-2); border-radius: 12px;
  height: 64px; display: flex; align-items: center; justify-content: center;
  padding: 6px; overflow: hidden;
}
.col-logo img { max-height: 50px; max-width: 100%; object-fit: contain; filter: drop-shadow(0 1px 2px rgba(0,0,0,0.06)); }

/* Carrier info column */
.col-info { min-width: 0; }
.carrier-name { font-size: 16px; font-weight: 800; color: var(--text); letter-spacing: -0.2px; }
.carrier-meta {
  display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px;
}
.tag {
  font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 999px;
  letter-spacing: 0.2px; display: inline-flex; align-items: center; gap: 4px;
}
.tag.direct { background: var(--success-bg); color: var(--success); }
.tag.ts { background: var(--warn-bg); color: var(--warn); }
.tag.country { background: #F1F5F9; color: var(--text-2); }
.tag.transit { background: #EFF6FF; color: #1D4ED8; }

/* Route column */
.col-route {
  display: flex; align-items: center; gap: 14px;
  font-size: 13px; color: var(--text-2);
  min-width: 0;
}
.route-leg { display: flex; flex-direction: column; min-width: 0; }
.route-leg .port { font-size: 16px; font-weight: 800; color: var(--text); font-variant-numeric: tabular-nums; }
.route-leg .date { font-size: 11px; color: var(--text-3); margin-top: 2px; font-weight: 600; }
.route-arrow {
  flex: 1; display: flex; align-items: center; gap: 6px; min-width: 80px;
  color: var(--text-3);
}
.route-arrow .line {
  flex: 1; height: 1.5px; background: var(--line); position: relative;
}
.route-arrow .line::before, .route-arrow .line::after {
  content: ''; position: absolute; top: 50%; width: 6px; height: 6px;
  border-radius: 50%; background: var(--text-3); transform: translateY(-50%);
}
.route-arrow .line::before { inset-inline-start: 0; }
.route-arrow .line::after { inset-inline-end: 0; }
.route-arrow .days {
  font-size: 11px; font-weight: 700; color: var(--brand-2);
  white-space: nowrap; background: white; padding: 2px 8px; border-radius: 999px;
  border: 1px solid var(--line); position: absolute; left: 50%; transform: translate(-50%, -50%); top: 50%;
}

/* Price + Action column */
.col-price-action { display: flex; flex-direction: column; align-items: flex-end; gap: 10px; }
.price-block { text-align: center; }
.price-currency { font-size: 11px; font-weight: 700; color: var(--text-3); letter-spacing: 0.4px; }
.price-amount { font-size: 26px; font-weight: 800; color: var(--brand); font-variant-numeric: tabular-nums; letter-spacing: -0.5px; }
.book-btn {
  background: var(--brand); color: white; border: none;
  padding: 11px 22px; border-radius: 12px; font-weight: 800; font-size: 13px;
  cursor: pointer; font-family: inherit; transition: all 0.15s;
  display: inline-flex; align-items: center; gap: 6px; white-space: nowrap;
  letter-spacing: 0.2px;
}
.book-btn:hover { background: var(--brand-2); transform: translateY(-1px); box-shadow: 0 6px 16px rgba(30, 91, 168, 0.3); }
.book-btn:active { transform: translateY(0); }

/* Expandable details */
.offer-extra {
  display: none; padding: 0 22px 18px;
  border-top: 1px dashed var(--line); margin-top: -4px;
}
.offer.open .offer-extra { display: block; animation: dropIn 0.2s; }
.extra-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; padding-top: 14px; }
.extra-item { font-size: 12px; }
.extra-item .lbl { color: var(--text-3); font-weight: 600; display: block; margin-bottom: 2px; }
.extra-item .val { color: var(--text); font-weight: 700; font-variant-numeric: tabular-nums; }

.toggle-details {
  position: absolute; top: 12px; inset-inline-end: 16px; font-size: 11px;
  color: var(--text-3); cursor: pointer; padding: 4px 10px; border-radius: 8px;
  background: transparent; border: none; font-family: inherit; font-weight: 600;
}
.toggle-details:hover { background: var(--line-2); color: var(--text); }

/* Empty state */
.empty-card { text-align: center; padding: 50px 24px; color: var(--text-3); }
.empty-icon { font-size: 56px; margin-bottom: 12px; opacity: 0.4; }
.empty-card h3 { font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
.empty-card p { font-size: 14px; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1><span class="icon">🚢</span> طلب عروض الشحن</h1>
    <nav>
      <a href="/dashboard.html">لوحة التحكم</a>
      <a href="/index.html">الرئيسية</a>
    </nav>
  </header>

  <!-- Stats -->
  <div class="hero-stats">
    <div class="stat"><div class="stat-icon blue">🚢</div><div><div class="stat-num">12+</div><div class="stat-lbl">خط ملاحي عالمي</div></div></div>
    <div class="stat"><div class="stat-icon green">⚡</div><div><div class="stat-num">40s</div><div class="stat-lbl">سرعة العروض</div></div></div>
    <div class="stat"><div class="stat-icon amber">📍</div><div><div class="stat-num">50+</div><div class="stat-lbl">ميناء حول العالم</div></div></div>
    <div class="stat"><div class="stat-icon cyan">💎</div><div><div class="stat-num">USD</div><div class="stat-lbl">All-in pricing</div></div></div>
  </div>

  <!-- Form Card -->
  <div class="card">
    <div class="mode-row">
      <button type="button" class="mode-btn active" data-mode="FCL">📦 حاوية كاملة (FCL)</button>
      <button type="button" class="mode-btn" data-mode="LCL" disabled>📦 شحن جزئي (LCL) <span class="soon">قريباً</span></button>
      <button type="button" class="mode-btn" data-mode="AIR" disabled>✈️ جوي <span class="soon">قريباً</span></button>
    </div>

    <form id="rateForm">
      <div class="port-row">
        <div>
          <label class="field-label">ميناء التحميل (Origin) <span class="req">*</span><span class="hint">— اكتب اسم أو كود</span></label>
          <div class="port-input">
            <input type="text" id="originPort" autocomplete="off" placeholder="مثال: شنغهاي، شنزن، جبل علي" required>
            <input type="hidden" name="originPort">
            <div class="port-suggestions" id="originSuggestions"></div>
          </div>
        </div>
        <div class="swap-wrap"><button type="button" class="swap" id="swapBtn" title="عكس الاتجاه">⇄</button></div>
        <div>
          <label class="field-label">ميناء التفريغ (Destination) <span class="req">*</span></label>
          <div class="port-input">
            <input type="text" id="destinationPort" autocomplete="off" placeholder="مثال: جدة، الدمام، ينبع" required>
            <input type="hidden" name="destinationPort">
            <div class="port-suggestions" id="destinationSuggestions"></div>
          </div>
        </div>
      </div>

      <div class="containers-section">
        <label class="field-label">نوع الحاوية والكمية <span class="req">*</span></label>
        <div id="containersList">
          <div class="container-row">
            <select name="containerType[]" class="ct-select">
              <option value="ALL">جميع الأنواع (20GP, 40GP, 40HC)</option>
              <option value="20GP">20'GP — حاوية قياسية</option>
              <option value="40GP">40'GP — حاوية ٤٠ قدم</option>
              <option value="40HC" selected>40'HC — حاوية عالية</option>
              <option value="40RF">40'RF — مبردة</option>

function getToken() {
  // Prefer Supabase session (always fresh after auto-refresh)
  for (const k of Object.keys(localStorage)) {
    if (k.startsWith('sb-') && k.endsWith('-auth-token')) {
      try { const d = JSON.parse(localStorage.getItem(k)); if (d?.access_token) return d.access_token; } catch {}
    }
  }
  const direct = localStorage.getItem('flx_access_token');
  if (direct) return direct;
  return '';
}

async function tryRefreshToken() {
  for (const k of Object.keys(localStorage)) {
    if (k.startsWith('sb-') && k.endsWith('-auth-token')) {
      try {
        const session = JSON.parse(localStorage.getItem(k));
        if (!session?.refresh_token) continue;
        const r = await fetch('/api/v1/auth/refresh', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ refresh_token: session.refresh_token }),
        });
        if (r.ok) {
          const j = await r.json();
          if (j.access_token) {
            const next = { ...session, ...j };
            localStorage.setItem(k, JSON.stringify(next));
            return true;
          }
        }
      } catch {}
    }
  }
  return false;
}

function setupPortInput(inputId, suggestionsId) {
  const wrap = document.getElementById(inputId).parentNode;
  const input = document.getElementById(inputId);
  const suggestions = document.getElementById(suggestionsId);
  const hidden = wrap.querySelector('input[type=hidden]');

  function render(matches, label) {
    if (matches.length === 0) {
      suggestions.innerHTML = '<div class="item empty">لا توجد ميناء مطابقة</div>';
    } else {
      const html = (label ? `<div class="group-label">${label}</div>` : '') +
        matches.slice(0, 30).map(p => `
          <div class="item" data-code="${p.code}" data-display="${p.nameAr} · ${p.country}">
            <div class="left">
              <span class="flag">${p.flag}</span>
              <div>
                <div class="name">${p.nameAr}</div>
                <div class="country">${p.country} · ${p.name}</div>
              </div>
            </div>
            <span class="code">${p.code}</span>
          </div>
        `).join('');
      suggestions.innerHTML = html;
      suggestions.querySelectorAll('.item').forEach(el => {
        el.addEventListener('click', () => {
          input.value = el.dataset.display;
          hidden.value = el.dataset.code;
          suggestions.classList.remove('show');
          wrap.classList.add('selected');
        });
      });
    }
    suggestions.classList.add('show');
  }

  input.addEventListener('input', () => {
    const q = input.value.trim().toLowerCase();
    hidden.value = '';
    wrap.classList.remove('selected');
    if (q.length < 1) { suggestions.classList.remove('show'); return; }
    const matches = PORTS.filter(p =>
      p.code.toLowerCase().includes(q) ||
      p.name.toLowerCase().includes(q) ||
      p.nameAr.includes(input.value.trim()) ||
      p.country.includes(input.value.trim())
    );
    render(matches);
  });

  input.addEventListener('focus', () => {
    if (input.value.trim().length === 0) render(PORTS.slice(0, 14), 'الموانئ الأكثر طلباً');
    else input.dispatchEvent(new Event('input'));
  });

  document.addEventListener('click', (e) => {
    if (!wrap.contains(e.target)) suggestions.classList.remove('show');
  });
}

function resolvePort(textInput, hiddenInput) {
  if (hiddenInput.value) return hiddenInput.value;
  const q = textInput.value.trim().toLowerCase();
  if (!q) return '';
  const exact = PORTS.find(p => p.code.toLowerCase() === q);
  if (exact) { hiddenInput.value = exact.code; textInput.value = exact.nameAr + ' · ' + exact.country; textInput.parentNode.classList.add('selected'); return exact.code; }
  const matches = PORTS.filter(p =>
    p.code.toLowerCase().includes(q) ||
    p.name.toLowerCase().includes(q) ||
    p.nameAr.includes(textInput.value.trim()) ||
    p.country.includes(textInput.value.trim())
  );
  if (matches.length === 1) {
    hiddenInput.value = matches[0].code;
    textInput.value = matches[0].nameAr + ' · ' + matches[0].country;
    textInput.parentNode.classList.add('selected');
    return matches[0].code;
  }
  return '';
}

const form = document.getElementById('rateForm');
const submitBtn = document.getElementById('submitBtn');
let allOffers = [];
let currentSort = 'price';
let lastSummary = { from: '', to: '', containers: '' };

form.addEventListener('submit', async (e) => {
  e.preventDefault();

  const originTextEl = document.getElementById('originPort');
  const destTextEl = document.getElementById('destinationPort');
  const originHidden = originTextEl.parentNode.querySelector('input[type=hidden]');
  const destHidden = destTextEl.parentNode.querySelector('input[type=hidden]');

  const originCode = resolvePort(originTextEl, originHidden);
  const destCode = resolvePort(destTextEl, destHidden);

  if (!originCode) { setStatus('⚠️ اختر ميناء التحميل من القائمة المنسدلة', 'error'); originTextEl.focus(); return; }
  if (!destCode)   { setStatus('⚠️ اختر ميناء التفريغ من القائمة المنسدلة', 'error'); destTextEl.focus(); return; }
  if (originCode === destCode) { setStatus('⚠️ ميناء التحميل لا يمكن أن يكون نفس ميناء التفريغ', 'error'); return; }

  const ctSelects = form.querySelectorAll('.ct-select');
  const ctQtys = form.querySelectorAll('.ct-qty');
  const containers = [];
  for (let i = 0; i < ctSelects.length; i++) {
    containers.push({ type: ctSelects[i].value, qty: parseInt(ctQtys[i].value) || 1 });
  }
  const primaryType = containers[0].type === 'ALL' ? '40HC' : containers[0].type;
  const totalQty = containers.reduce((s, c) => s + c.qty, 0);

  const payload = {
    mode: currentMode,
    originPort: originCode, origin_port: originCode,
    destinationPort: destCode, destination_port: destCode,
    containerType: primaryType, containers, numContainers: totalQty,
    cargoType: currentMode === 'FCL' ? 'FCL' : 'LCL',
    cargoCategory: form.cargoCategory.value,
    cargoCategoryName: form.cargoCategory.options[form.cargoCategory.selectedIndex].text,
    commodityCode: '8517',
    commodityName: form.cargoCategory.options[form.cargoCategory.selectedIndex].text,
    cargoWeightKg: 15000,
    cargoReadyDate: new Date(Date.now() + 7 * 86400000).toISOString().slice(0, 10),
    incoterms: 'FOB', serviceModeOrigin: 'CY', serviceModeDestination: 'CY',
    hazardous: false,
  };

  submitBtn.disabled = true;
  setStatus('جاري البحث عن أفضل العروض من 12 خط ملاحي عالمي…', 'loading', true);
  document.getElementById('resultsCard').style.display = 'none';
  document.getElementById('skeleton').style.display = 'block';

  const oP = PORTS.find(p => p.code === originCode);
  const dP = PORTS.find(p => p.code === destCode);
  lastSummary = {
    from: oP ? `${oP.flag} ${oP.nameAr}` : originCode,
    to: dP ? `${dP.flag} ${dP.nameAr}` : destCode,
    containers: containers.map(c => c.qty + '×' + (c.type === 'ALL' ? 'Any' : c.type)).join(' + '),
  };

  try {
    const t0 = Date.now();
    const r = await fetch('/api/v1/rates/search', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + getToken() },
      body: JSON.stringify(payload),
    });
    if (!r.ok) {
      if (r.status === 401) {
        // Try refresh once before redirecting
        const refreshed = await tryRefreshToken();
        if (refreshed) {
          // Retry the search with new token
          return searchRates();
        }
        setStatus('⚠️ انتهت جلستك. سيتم تحويلك لتسجيل الدخول...', 'error');
        setTimeout(() => (location.href = '/?login=1'), 1500);
        return;
      }
      throw new Error('HTTP ' + r.status);
    }
    const data = await r.json();
    allOffers = data.offers || [];
    const ms = Date.now() - t0;
    const reqId = data.freightify_req_id;
    const inProgress = data.in_progress;

    // CASE A: No offers AND no reqId → genuinely no rates for this route
    if (allOffers.length === 0 && !reqId) {
      const reason = data.freightify_fallback_reason || {};
      let msg = '⚠️ لم نتلقى أسعار من الخطوط الملاحية لهذا المسار';
      if (reason.error && reason.error.includes('timeout')) {
        msg = '⏱️ الخطوط الملاحية لم ترد خلال 50 ثانية — حاول مرة أخرى أو جرّب مساراً آخر';
      } else if (reason.error && reason.error.includes('no offers')) {
        msg = '📭 لا توجد أسعار متاحة من 12 خط ملاحي لهذا المسار حالياً';
      }
      setStatus(msg, 'error');
      document.getElementById('skeleton').style.display = 'none';
      return;
    }

    // Display whatever offers we got initially
    document.getElementById('summary').innerHTML =
      `<strong>${lastSummary.from}</strong> → <strong>${lastSummary.to}</strong> · ${currentMode} · ${lastSummary.containers}`;
    document.getElementById('skeleton').style.display = 'none';
    document.getElementById('resultsCard').style.display = 'block';

    if (allOffers.length > 0) {
      setStatus(`✅ ${allOffers.length} عرض من 12 خط ملاحي (${ms}ms)${inProgress ? ' — جاري البحث عن المزيد...' : ''}`, 'success');
      renderOffers();
      document.getElementById('resultsCard').scrollIntoView({ behavior: 'smooth' });
    } else {
      setStatus(`⏳ جاري البحث في 12 خط ملاحي... قد يستغرق دقيقة`, 'info');
    }

    // CASE B: We have a reqId AND status is INPROGRESS → keep polling for more offers
    if (reqId && inProgress) {
      let pollAttempts = 0;
      const MAX_POLLS = 18; // up to ~90s of polling
      const pollInterval = setInterval(async () => {
        pollAttempts++;
        try {
          const pr = await fetch(`/api/v1/rates/poll/${encodeURIComponent(reqId)}`, {
            headers: { 'Authorization': 'Bearer ' + getToken() },
          });
          if (!pr.ok) return;
          const pd = await pr.json();
          const newOffers = pd.offers || [];
          if (newOffers.length > allOffers.length) {
            allOffers = newOffers;
            renderOffers();
            if (document.getElementById('resultsCard').style.display === 'none') {
              document.getElementById('resultsCard').style.display = 'block';
              document.getElementById('resultsCard').scrollIntoView({ behavior: 'smooth' });
            }
            setStatus(`✅ ${allOffers.length} عرض من 12 خط ملاحي${pd.completed ? ' (مكتمل)' : ' — يبحث عن المزيد...'}`, 'success');
          }
          if (pd.completed || pd.status === 'COMPLETED' || pollAttempts >= MAX_POLLS) {
            clearInterval(pollInterval);
            if (allOffers.length === 0) {
              setStatus('📭 لم نجد أسعار من 12 خط ملاحي لهذا المسار بعد محاولات متعددة', 'error');
            } else {
              setStatus(`✅ ${allOffers.length} عرض من 12 خط ملاحي (مكتمل)`, 'success');
            }
          }
        } catch (e) {
          console.error('Poll error:', e);
        }
      }, 5000); // poll every 5 seconds
    }
  } catch (err) {
    setStatus('❌ فشل البحث: ' + err.message, 'error');
    document.getElementById('skeleton').style.display = 'none';
  } finally {
    submitBtn.disabled = false;
  }
});

// SCAC code → local carrier logo (SVG in /assets/carriers/) for the 12 global lines
const CARRIER_LOGOS = {
  // 1. Maersk (all SCAC variants)
  MAEU: '/assets/carriers/maersk.svg',
  SEAU: '/assets/carriers/maersk.svg',
  MAEI: '/assets/carriers/maersk.svg',
  // 2. MSC
  MSCU: '/assets/carriers/msc.svg',
  // 3. COSCO
  COSU: '/assets/carriers/cosco.svg',
  // 4. CMA CGM
  CMDU: '/assets/carriers/cma-cgm.svg',
  // 5. Hapag-Lloyd
  HLCU: '/assets/carriers/hapag-lloyd.svg',
  // 6. ONE
  ONEY: '/assets/carriers/one.svg',
  ONNE: '/assets/carriers/one.svg',
  // 7. Evergreen
  EGLV: '/assets/carriers/evergreen.svg',
  // 8. HMM
  HMMU: '/assets/carriers/hmm.svg',
  // 9. OOCL (COSCO subsidiary)
  OOLU: '/assets/carriers/oocl.svg',
  // 10. APL (CMA CGM subsidiary)
  APLU: '/assets/carriers/apl.svg',
  // 11. ANL (CMA CGM subsidiary) — uses Group logo until local SVG added
  ANNU: '/assets/carriers/anl.svg',
  ANLC: '/assets/carriers/anl.svg',
  // 12. CNC (CMA CGM subsidiary) — uses Group logo until local SVG added
  CHNL: '/assets/carriers/cnc.svg',
  CNCO: '/assets/carriers/cnc.svg',
  CNCL: '/assets/carriers/cnc.svg',
  // Regional & Saudi-specific
  AKKU: 'https://www.arkasline.com.tr/Resources/site/img/logo.png',
  CSCL: 'https://upload.wikimedia.org/wikipedia/commons/thumb/4/4c/Cosco_logo.svg/320px-Cosco_logo.svg.png',
  KMTU: 'https://logo.clearbit.com/kmtcline.com',
  TSLU: 'https://logo.clearbit.com/tsline.com.tw',
  IRSU: 'https://logo.clearbit.com/irisl.net',
  UASU: 'https://upload.wikimedia.org/wikipedia/commons/thumb/8/87/United_Arab_Shipping_Company_logo.png/320px-United_Arab_Shipping_Company_logo.png',
  ANNU: 'https://upload.wikimedia.org/wikipedia/commons/thumb/0/0a/Ocean_Network_Express_logo.svg/320px-Ocean_Network_Express_logo.svg.png',
};
// Map common carrier names → SCAC (case-insensitive)
const NAME_TO_SCAC = {
  'maersk': 'MAEU', 'a.p. moller-maersk': 'MAEU', 'apm-maersk': 'MAEU',
  'mediterranean shipping company': 'MSCU', 'msc': 'MSCU',
  'cosco shipping lines': 'COSU', 'cosco': 'COSU', 'china cosco shipping': 'COSU',
  'cma cgm': 'CMDU',
  'hapag-lloyd': 'HLCU', 'hapag lloyd': 'HLCU',
  'ocean network express': 'ONEY', 'one': 'ONEY',
  'evergreen marine': 'EGLV', 'evergreen': 'EGLV',
  'oocl': 'OOLU', 'orient overseas container line': 'OOLU',
  'yang ming': 'YMLU', 'yang ming marine transport': 'YMLU',
  'hmm': 'HMMU', 'hyundai merchant marine': 'HMMU',
  // CMA CGM Group subsidiaries
  'apl': 'APLU', 'american president lines': 'APLU',
  'anl': 'ANLC', 'australian national line': 'ANLC',
  'cnc': 'CNCO', 'cheng lie navigation': 'CNCO',
  'arkas': 'AKKU', 'arkas line': 'AKKU',
};

function getCarrierLogoUrl(o) {
  // 1) If backend gave us a logo, use it (works for both /local and https://)
  if (o.carrier_logo) return o.carrier_logo;
  // 2) Try mapping by SCAC code
  const code = (o.carrier_code || '').toUpperCase();
  if (code && CARRIER_LOGOS[code]) return CARRIER_LOGOS[code];
  // 3) Try mapping by name
  const key = (o.carrier_name || '').toLowerCase().trim();
  if (NAME_TO_SCAC[key] && CARRIER_LOGOS[NAME_TO_SCAC[key]]) {
    return CARRIER_LOGOS[NAME_TO_SCAC[key]];
  }
  // 4) Partial match (e.g. "Maersk Line" → MAEU)
  for (const [n, scac] of Object.entries(NAME_TO_SCAC)) {
    if (key.includes(n) && CARRIER_LOGOS[scac]) return CARRIER_LOGOS[scac];
  }
  return null;
}

// Global fallback handler — try CMA CGM Group logo for subsidiaries first, then initials
window.flxCarrierLogoFallback = function(img) {
  const parent = img.parentElement;
  if (!parent) return;
  const cur = img.getAttribute('src') || '';
  // CMA CGM Group subsidiaries → fall back to CMA CGM Group logo
  if ((cur.includes('/anl.svg') || cur.includes('/cnc.svg')) && !img.dataset.fbTried) {
    img.dataset.fbTried = '1';
    img.src = '/assets/carriers/cma-cgm.svg';
    return;
  }
  const bg = parent.dataset.fallbackBg || 'linear-gradient(135deg, #0F2C4D, #1E5BA8)';
  const initials = parent.dataset.initials || 'CR';
  parent.style.background = bg;
  parent.innerHTML = '<span style="color:white;font-weight:800;font-size:16px;letter-spacing:0.05em">' + initials + '</span>';
};

function carrierLogoHTML(o) {
  const rawName = (o.carrier_name || 'Carrier');
  const safeName = rawName.replace(/"/g, '&quot;').replace(/</g, '&lt;');
  const initials = rawName.toUpperCase().split(/\s+/).slice(0, 2).map(w => w[0] || '').join('').slice(0, 3) || 'CR';
  const bg = (o.brand_color || 'linear-gradient(135deg, #0F2C4D, #1E5BA8)').replace(/"/g, '&quot;');
  const logoUrl = getCarrierLogoUrl(o);

  if (logoUrl) {
    return `<div class="col-logo" data-fallback-bg="${bg}" data-initials="${initials}">
      <img src="${logoUrl}" alt="${safeName}" loading="lazy" onerror="flxCarrierLogoFallback(this)">
    </div>`;
  }
  return `<div class="col-logo" style="background:${o.brand_color || 'linear-gradient(135deg, #0F2C4D, #1E5BA8)'};">
    <span style="color:white;font-weight:800;font-size:16px;letter-spacing:0.05em">${initials}</span>
  </div>`;
}

function fmtDate(s) {
  if (!s) return '—';
  try {
    const d = new Date(s);
    const months = ['ينا','فبر','مار','أبر','ماي','يون','يول','أغس','سبت','أكت','نوف','ديس'];
    return d.getDate() + ' ' + months[d.getMonth()];
  } catch { return s; }
}

function renderOffers() {
  let cheapest = null, fastest = null;
  for (const o of allOffers) {
    if (!cheapest || o.price < cheapest.price) cheapest = o;
    if (!fastest  || o.transit_days < fastest.transit_days) fastest = o;
  }
  const isFeatured = (o) => cheapest && o === cheapest;
  const isFastest  = (o) => fastest  && o === fastest && (!cheapest || fastest !== cheapest);

  const sorted = [...allOffers].sort((a, b) => {
    if (currentSort === 'price') return a.price - b.price;
    if (currentSort === 'transit_days') return a.transit_days - b.transit_days;
    return (a.carrier_name || '').localeCompare(b.carrier_name || '');
  });

  document.getElementById('offerCount').textContent = sorted.length;
  if (sorted.length === 0) {
    document.getElementById('offers').innerHTML = `
      <div class="empty-card">
        <div class="empty-icon">🚢</div>
        <h3>لا توجد عروض متاحة لهذا المسار</h3>
        <p>جرّب مسار آخر أو غيّر نوع الحاوية</p>
      </div>`;
    return;
  }

  document.getElementById('offers').innerHTML = sorted.map((o, i) => {
    const directTag = o.is_direct
      ? '<span class="tag direct">✓ مباشر</span>'
      : '<span class="tag ts">↻ ترانزيت</span>';
    const ribbon = isFeatured(o) ? '<div class="offer-ribbon best">★ الأفضل سعراً</div>'
                  : isFastest(o)  ? '<div class="offer-ribbon fast">⚡ الأسرع</div>' : '';
    const cardClass = isFeatured(o) ? 'offer featured' : isFastest(o) ? 'offer fastest' : 'offer';
    const offerJson = JSON.stringify(o).replace(/'/g, '&apos;');
    return `<article class="${cardClass}" style="animation-delay:${Math.min(i, 14) * 35}ms" data-id="${i}">
      ${ribbon}
      <button class="toggle-details" data-toggle="${i}">التفاصيل ▾</button>
      <div class="offer-body">
        ${carrierLogoHTML(o)}
        <div class="col-info">
          <div class="carrier-name">${o.carrier_name || 'Carrier'}</div>
          <div class="carrier-meta">
            ${directTag}
            ${o.country ? `<span class="tag country">${o.country}</span>` : ''}
            ${o.service_type ? `<span class="tag transit">${o.service_type}</span>` : ''}
          </div>
        </div>
        <div class="col-route">
          <div class="route-leg">
            <span class="port">${(o.route || '').split('→')[0]?.trim() || '—'}</span>
            <span class="date">ETD ${fmtDate(o.etd)}</span>
          </div>
          <div class="route-arrow" style="position:relative;">
            <div class="line"></div>
            <span class="days">${o.transit_days} يوم</span>
          </div>
          <div class="route-leg" style="text-align:end;">
            <span class="port">${(o.route || '').split('→')[1]?.trim() || '—'}</span>
            <span class="date">ETA ${fmtDate(o.eta)}</span>
          </div>
        </div>
        <div class="col-price-action">
          <div class="price-block">
            <div class="price-currency">${o.currency || 'USD'}</div>
            <div class="price-amount">$${Number(o.price).toLocaleString()}</div>
          </div>
          <button class="book-btn" data-offer='${offerJson}'>احجز الآن ←</button>
        </div>
      </div>
      <div class="offer-extra">
        <div class="extra-grid">
          <div class="extra-item"><span class="lbl">السفينة</span><span class="val">${o.vessel || '—'}</span></div>
          <div class="extra-item"><span class="lbl">أيام مجانية في الميناء</span><span class="val">${o.free_days || 10} يوم</span></div>
          <div class="extra-item"><span class="lbl">العرض صالح حتى</span><span class="val">${o.validity_until || '—'}</span></div>
          <div class="extra-item"><span class="lbl">نوع الخدمة</span><span class="val">${o.is_direct ? 'مباشر' : 'مع ترانزيت'}</span></div>
        </div>
      </div>
    </article>`;
  }).join('');

  document.querySelectorAll('.book-btn').forEach(b => {
    b.addEventListener('click', () => bookOffer(JSON.parse(b.dataset.offer.replace(/&apos;/g, "'"))));
  });
  document.querySelectorAll('.toggle-details').forEach(b => {
    b.addEventListener('click', (e) => {
      e.stopPropagation();
      const card = b.closest('.offer');
      card.classList.toggle('open');
      b.textContent = card.classList.contains('open') ? 'إخفاء ▴' : 'التفاصيل ▾';
    });
  });
}

document.querySelectorAll('.sort-btn').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.sort-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    currentSort = b.dataset.sort;
    renderOffers();
  });
});

// ─── Booking workflow with rich confirmation modal ───
async function bookOffer(o) {
  if (!window.flxApi || !window.flxApi.isAuthenticated()) {
    const goLogin = await flxBookingPrompt({
      icon: '🔐',
      title: 'سجّل دخول أولاً',
      desc: 'لإتمام الحجز ومتابعة شحناتك يلزم إنشاء حساب أو تسجيل الدخول.',
      confirmText: 'تسجيل الدخول',
      cancelText: 'إلغاء',
    });
    if (goLogin) window.location.href = '/?login=1';
    return;
  }
  const confirmed = await flxBookingPrompt({
    icon: '🚢',
    title: 'تأكيد الحجز',
    desc: `سيتم حجز شحنة مع <strong>${o.carrier_name}</strong> بسعر <strong>$${(o.price || 0).toLocaleString()}</strong> للحاوية.`,
    meta: [
      ['الناقل', o.carrier_name],
      ['المسار', o.route || '—'],
      ['ETA', o.eta || '—'],
      ['الترانزيت', `${o.transit_days || '—'} يوم`],
      ['السعر', `$${(o.price || 0).toLocaleString()} ${o.currency || 'USD'}`],
    ],
    confirmText: 'تأكيد الحجز',
    cancelText: 'إلغاء',
  });
  if (!confirmed) return;
  flxBookingLoader('جاري إنشاء الحجز...');
  try {
    const quote = await flxApi.quotes.create({
      origin: document.getElementById('originPort').parentNode.querySelector('input[type=hidden]').value,
      destination: document.getElementById('destinationPort').parentNode.querySelector('input[type=hidden]').value,
      carrier: o.carrier_name, container: '40HC',
      price: o.price, valid_until: o.validity_until || new Date(Date.now() + 7 * 86400000).toISOString().slice(0, 10),
    });
    const booked = await flxApi.quotes.book(quote.id);
    flxBookingSuccess(booked);
  } catch (e) {
    flxBookingError(e.message);
  }
}

// ─── Glass-themed booking modal helpers ───
function flxBookingModal(html) {
  const old = document.getElementById('flxBookingOverlay');
  if (old) old.remove();
  const overlay = document.createElement('div');
  overlay.id = 'flxBookingOverlay';
  overlay.className = 'flx-book-overlay';
  overlay.innerHTML = `<div class="flx-book-modal">${html}</div>`;
  document.body.appendChild(overlay);
  // Trigger animation
  requestAnimationFrame(() => overlay.classList.add('open'));
  return overlay;
}

function flxBookingPrompt({ icon, title, desc, meta, confirmText, cancelText }) {
  return new Promise((resolve) => {
    const metaHtml = meta ? `<div class="flx-book-meta">${meta.map(([k,v]) => `<div class="flx-book-meta-row"><span>${k}</span><strong>${v}</strong></div>`).join('')}</div>` : '';
    const overlay = flxBookingModal(`
      <div class="flx-book-icon">${icon || '🚢'}</div>
      <h3 class="flx-book-title">${title}</h3>
      <p class="flx-book-desc">${desc}</p>
      ${metaHtml}
      <div class="flx-book-actions">
        <button class="flx-book-cancel" id="flxBookCancel">${cancelText || 'إلغاء'}</button>
        <button class="flx-book-confirm" id="flxBookConfirm">${confirmText || 'تأكيد'}</button>
      </div>
    `);
    overlay.querySelector('#flxBookConfirm').onclick = () => { overlay.remove(); resolve(true); };
    overlay.querySelector('#flxBookCancel').onclick = () => { overlay.remove(); resolve(false); };
    overlay.onclick = (e) => { if (e.target === overlay) { overlay.remove(); resolve(false); } };
  });
}

function flxBookingLoader(msg) {
  flxBookingModal(`
    <div class="flx-book-loader"><div class="flx-spinner"></div></div>
    <h3 class="flx-book-title">${msg || 'جاري المعالجة...'}</h3>
    <p class="flx-book-desc">يتم تأكيد الحجز مع الناقل وإنشاء الفاتورة.</p>
  `);
}

function flxBookingSuccess(booked) {
  const shipmentId = booked?.shipment?.id || '';
  const invoiceId = booked?.invoice?.id || '';
  const overlay = flxBookingModal(`
    <div class="flx-book-icon flx-success-icon">✓</div>
    <h3 class="flx-book-title" style="color:#4ade80">تم الحجز بنجاح!</h3>
    <p class="flx-book-desc">تم إنشاء شحنتك ولفاتورتك. ستجدهم في لوحة التحكم.</p>
    <div class="flx-book-meta">
      <div class="flx-book-meta-row"><span>رقم الشحنة</span><strong style="font-family:'JetBrains Mono',monospace;color:#39C6FF">${shipmentId}</strong></div>
      <div class="flx-book-meta-row"><span>رقم الفاتورة</span><strong style="font-family:'JetBrains Mono',monospace;color:#39C6FF">${invoiceId}</strong></div>
    </div>
    <div class="flx-book-actions">
      <button class="flx-book-cancel" onclick="location.reload()">بحث جديد</button>
      <button class="flx-book-confirm" onclick="window.location.href='/dashboard.html#section-shipments'">عرض في لوحة التحكم →</button>
    </div>
  `);
}

function flxBookingError(msg) {
  flxBookingModal(`
    <div class="flx-book-icon flx-error-icon">!</div>
    <h3 class="flx-book-title" style="color:#f87171">فشل الحجز</h3>
    <p class="flx-book-desc">${msg || 'حدث خطأ غير متوقع. حاول مرة ثانية أو تواصل مع الدعم.'}</p>
    <div class="flx-book-actions">
      <button class="flx-book-confirm" onclick="document.getElementById('flxBookingOverlay').remove()">حسناً</button>
    </div>
  `);
}

function prefillFromURL() {
  const u = new URL(location.href);
  const from = u.searchParams.get('from') || u.searchParams.get('origin');
  const to   = u.searchParams.get('to')   || u.searchParams.get('destination') || u.searchParams.get('dest');
  const ctype = u.searchParams.get('type') || u.searchParams.get('container');
  const qty   = parseInt(u.searchParams.get('qty')) || 1;
  const cargo = u.searchParams.get('cargo') || u.searchParams.get('category');
  const mode  = (u.searchParams.get('mode') || 'FCL').toUpperCase();
  const auto  = u.searchParams.get('auto') === '1';

  if (from) {
    const p = PORTS.find(x => x.code.toUpperCase() === from.toUpperCase());
    if (p) {
      const el = document.getElementById('originPort');
      el.value = p.nameAr + ' · ' + p.country;
      el.parentNode.querySelector('input[type=hidden]').value = p.code;
      el.parentNode.classList.add('selected');
    }
  }
  if (to) {
    const p = PORTS.find(x => x.code.toUpperCase() === to.toUpperCase());
    if (p) {
      const el = document.getElementById('destinationPort');
      el.value = p.nameAr + ' · ' + p.country;
      el.parentNode.querySelector('input[type=hidden]').value = p.code;
      el.parentNode.classList.add('selected');
    }
  }
  if (ctype) {
    const sel = form.querySelector('.ct-select');
    if (sel && [...sel.options].some(o => o.value === ctype.toUpperCase())) sel.value = ctype.toUpperCase();
  }
  if (qty > 1) { const q = form.querySelector('.ct-qty'); if (q) q.value = Math.min(999, qty); }
  if (cargo) {
    const sel = form.querySelector('#cargoCategory');
    if (sel && [...sel.options].some(o => o.value === cargo)) sel.value = cargo;
  }
  if (['FCL','LCL','AIR'].includes(mode)) {
    const btn = document.querySelector(`.mode-btn[data-mode="${mode}"]`);
    if (btn && !btn.disabled) btn.click();
  }
  if (auto && from && to) setTimeout(() => form.requestSubmit(), 400);
}

window.addEventListener('load', () => {
  prefillFromURL();
  if (!flxApi.isAuthenticated()) {
    setStatus('⚠️ يجب تسجيل الدخول لطلب الأسعار', 'error');
  }
});
</script>
