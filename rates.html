<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>طلب عروض الشحن — FREIGHTLX</title>
<script>window.FLX_API_BASE = '/api/v1';</script>
<style>
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', 'Tahoma', sans-serif;
  background: linear-gradient(135deg, #f6f9ff 0%, #eef3ff 100%);
  min-height: 100vh;
  color: #1e293b;
  line-height: 1.6;
}
.container { max-width: 1280px; margin: 0 auto; padding: 24px; }
header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 16px 0; margin-bottom: 24px;
}
header h1 { font-size: 22px; font-weight: 700; color: #1e3a5f; }
header a { color: #1e3a5f; text-decoration: none; font-weight: 500; }
header a:hover { text-decoration: underline; }

.card {
  background: white; border-radius: 16px; padding: 24px;
  box-shadow: 0 4px 24px rgba(15, 23, 42, 0.06);
  margin-bottom: 24px;
}
.card-title {
  font-size: 18px; font-weight: 700; margin-bottom: 16px;
  color: #1e3a5f; display: flex; align-items: center; gap: 8px;
}

form .grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 16px; margin-bottom: 16px;
}
label { display: block; font-size: 13px; font-weight: 600; color: #475569; margin-bottom: 6px; }
input, select, textarea {
  width: 100%; padding: 10px 12px; border: 1px solid #cbd5e1;
  border-radius: 10px; font-size: 14px; font-family: inherit;
  background: #fafbff; transition: all 0.2s; color: #1e293b;
}
input:focus, select:focus, textarea:focus {
  outline: none; border-color: #4f46e5; background: white;
  box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
}
.btn {
  padding: 12px 24px; border-radius: 12px; border: none; cursor: pointer;
  font-size: 15px; font-weight: 700; font-family: inherit;
  transition: all 0.2s;
}
.btn-primary {
  background: linear-gradient(135deg, #4f46e5, #6366f1); color: white;
  box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
}
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(79, 70, 229, 0.4); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.btn-secondary { background: #f1f5f9; color: #475569; }

.checkbox-row { display: flex; align-items: center; gap: 8px; padding: 10px; background: #f8fafc; border-radius: 10px; }
.checkbox-row input[type="checkbox"] { width: auto; }

#status { padding: 12px 16px; border-radius: 10px; margin-bottom: 16px; font-size: 14px; display: none; }
#status.loading { background: #dbeafe; color: #1e40af; display: block; }
#status.success { background: #dcfce7; color: #166534; display: block; }
#status.error { background: #fee2e2; color: #b91c1c; display: block; }

.toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; gap: 16px; flex-wrap: wrap; }
.toolbar .summary { font-size: 14px; color: #64748b; }
.toolbar .sort { display: flex; gap: 8px; }
.toolbar .sort button { padding: 6px 14px; font-size: 13px; border-radius: 8px; border: 1px solid #cbd5e1; background: white; cursor: pointer; }
.toolbar .sort button.active { background: #1e3a5f; color: white; border-color: #1e3a5f; }

.offers { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
.offer {
  background: white; border-radius: 14px; overflow: hidden;
  box-shadow: 0 2px 12px rgba(15, 23, 42, 0.06);
  border: 1px solid #e2e8f0; transition: all 0.2s;
}
.offer:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(15, 23, 42, 0.12); }
.offer-brand {
  height: 56px; display: flex; align-items: center; justify-content: center;
  padding: 8px;
}
.offer-brand img { max-height: 40px; max-width: 70%; }
.offer-body { padding: 16px; }
.offer-price { font-size: 28px; font-weight: 800; color: #1e3a5f; }
.offer-currency { font-size: 14px; color: #64748b; }
.offer-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 13px; border-top: 1px dashed #e2e8f0; margin-top: 8px; }
.offer-row span:first-child { color: #64748b; }
.offer-row span:last-child { color: #1e293b; font-weight: 600; }
.offer-meta { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
.tag { font-size: 11px; padding: 3px 8px; border-radius: 999px; background: #eef2ff; color: #4f46e5; font-weight: 600; }
.tag.direct { background: #dcfce7; color: #166534; }
.tag.ts { background: #fef3c7; color: #92400e; }

.book-btn {
  width: 100%; margin-top: 12px; padding: 10px;
  background: #1e3a5f; color: white; border: none; border-radius: 10px;
  font-weight: 700; cursor: pointer; font-size: 14px;
}
.book-btn:hover { background: #2c4d7a; }

.empty { text-align: center; padding: 40px; color: #94a3b8; }
.spinner { width: 20px; height: 20px; border: 3px solid #c7d2fe; border-top-color: #4f46e5; border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; vertical-align: middle; margin-left: 8px; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>🚢 طلب عروض الشحن</h1>
    <a href="/dashboard.html">→ لوحة التحكم</a>
  </header>

  <!-- Rate Request Form -->
  <div class="card">
    <div class="card-title">📋 معلومات الشحنة</div>
    <form id="rateForm">
      <div class="grid">
        <div>
          <label>ميناء التحميل (POL) *</label>
          <select name="originPort" required>
            <option value="">— اختر —</option>
            <optgroup label="🇨🇳 الصين">
              <option value="CNSHA">Shanghai · شنغهاي</option>
              <option value="CNNGB">Ningbo · نينغبو</option>
              <option value="CNSHK">Shenzhen · شنزن</option>
              <option value="CNYTN">Yantian · يانتيان</option>
              <option value="CNTAO">Qingdao · تشينغداو</option>
              <option value="CNTSN">Tianjin · تيانجين</option>
              <option value="CNXMN">Xiamen · شيامن</option>
            </optgroup>
            <optgroup label="🇸🇬 آسيا">
              <option value="SGSIN">Singapore · سنغافورة</option>
              <option value="HKHKG">Hong Kong · هونغ كونغ</option>
              <option value="MYPKG">Port Klang · بورت كلانغ</option>
              <option value="INNSA">Nhava Sheva · ناڤا شيفا</option>
              <option value="INMUN">Mundra · موندرا</option>
            </optgroup>
            <optgroup label="🇹🇷 الشرق الأوسط/المتوسط">
              <option value="TRMER">Mersin · مرسين</option>
              <option value="TRIST">Istanbul · إسطنبول</option>
              <option value="AEJEA">Jebel Ali · جبل علي</option>
            </optgroup>
            <optgroup label="🇪🇺 أوروبا">
              <option value="DEHAM">Hamburg · هامبورغ</option>
              <option value="NLRTM">Rotterdam · روتردام</option>
              <option value="BEANR">Antwerp · أنتويرب</option>
            </optgroup>
          </select>
        </div>
        <div>
          <label>ميناء التفريغ (POD) *</label>
          <select name="destinationPort" required>
            <option value="">— اختر —</option>
            <optgroup label="🇸🇦 المملكة العربية السعودية">
              <option value="SAJED" selected>Jeddah · جدة</option>
              <option value="SADMM">Dammam · الدمام</option>
              <option value="SAJUB">Jubail · الجبيل</option>
              <option value="SAYNB">Yanbu · ينبع</option>
              <option value="SARAB">King Abdullah · رابغ</option>
              <option value="SAJIZ">Jazan · جازان</option>
              <option value="SADUB">Duba · ضباء</option>
            </optgroup>
          </select>
        </div>
        <div>
          <label>نوع الحاوية *</label>
          <select name="containerType" required>
            <option value="20GP">20'GP — حاوية قياسية</option>
            <option value="40GP">40'GP — حاوية ٤٠ قدم</option>
            <option value="40HC" selected>40'HC — عالية</option>
            <option value="40RF">40'RF — مبردة</option>
            <option value="45HC">45'HC — جامبو</option>
            <option value="LCL">LCL — شحن جزئي</option>
          </select>
        </div>
        <div>
          <label>نوع الشحن *</label>
          <select name="cargoType" required>
            <option value="FCL" selected>FCL — حاوية كاملة</option>
            <option value="LCL">LCL — جزئية</option>
            <option value="Reefer">Reefer — مبردة</option>
            <option value="OOG">OOG — خارج المقاييس</option>
            <option value="Bulk">Bulk — صب</option>
            <option value="Air">Air — جوي</option>
          </select>
        </div>
        <div>
          <label>كود HS للسلعة</label>
          <input type="text" name="commodityCode" placeholder="مثل: 8517" pattern="[0-9]{4,10}" maxlength="10">
        </div>
        <div>
          <label>اسم السلعة</label>
          <input type="text" name="commodityName" placeholder="إلكترونيات، ملابس، إلخ">
        </div>
        <div>
          <label>الوزن الإجمالي (كجم)</label>
          <input type="number" name="cargoWeightKg" min="1" step="0.01" placeholder="20000">
        </div>
        <div>
          <label>الحجم (م³) — للـ LCL</label>
          <input type="number" name="cargoVolumeM3" min="0.1" step="0.01" placeholder="15">
        </div>
        <div>
          <label>تاريخ جاهزية البضاعة</label>
          <input type="date" name="cargoReadyDate">
        </div>
        <div>
          <label>شروط الانكوترمز</label>
          <select name="incoterms">
            <option value="">— اختياري —</option>
            <option value="EXW">EXW — تسليم المصنع</option>
            <option value="FCA">FCA — تسليم الناقل</option>
            <option value="FOB" selected>FOB — على ظهر السفينة</option>
            <option value="CFR">CFR — تكلفة وأجرة</option>
            <option value="CIF">CIF — تكلفة وتأمين وأجرة</option>
            <option value="DAP">DAP — التسليم في المكان</option>
            <option value="DDP">DDP — التسليم مع الرسوم</option>
          </select>
        </div>
        <div>
          <label>عدد الحاويات</label>
          <input type="number" name="numContainers" min="1" max="999" value="1">
        </div>
        <div>
          <label>ملاحظات إضافية</label>
          <input type="text" name="notes" placeholder="مواد خطرة، تعبئة خاصة، إلخ">
        </div>
      </div>
      <div class="checkbox-row">
        <input type="checkbox" name="hazardous" id="hazardous">
        <label for="hazardous" style="margin: 0;">⚠️ تحتوي الشحنة على مواد خطرة (IMO/DG)</label>
      </div>
      <div id="status"></div>
      <div style="display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap;">
        <button type="submit" class="btn btn-primary" id="submitBtn">
          🔍 ابحث عن العروض
        </button>
        <button type="reset" class="btn btn-secondary">🗑️ مسح</button>
      </div>
    </form>
  </div>

  <!-- Results -->
  <div class="card" id="resultsCard" style="display:none;">
    <div class="card-title">💰 العروض المتاحة (<span id="offerCount">0</span>)</div>
    <div class="toolbar">
      <div class="summary" id="summary"></div>
      <div class="sort">
        <button data-sort="price" class="active">الأرخص</button>
        <button data-sort="transit_days">الأسرع</button>
        <button data-sort="carrier_name">الناقل</button>
      </div>
    </div>
    <div class="offers" id="offers"></div>
  </div>
</div>

<script src="/flx-api-client.js"></script>
<script>
const form = document.getElementById('rateForm');
const submitBtn = document.getElementById('submitBtn');
const statusEl = document.getElementById('status');
const resultsCard = document.getElementById('resultsCard');
const offersEl = document.getElementById('offers');
const offerCountEl = document.getElementById('offerCount');
const summaryEl = document.getElementById('summary');

let allOffers = [];
let currentSort = 'price';

// Default cargo ready date = 7 days from now
form.cargoReadyDate.value = new Date(Date.now() + 7 * 86400000).toISOString().slice(0, 10);

function setStatus(msg, kind) {
  statusEl.textContent = msg;
  statusEl.className = kind || '';
  if (!msg) statusEl.style.display = 'none';
}

function carrierLogoHTML(o) {
  const code = (o.carrier_code || '').toLowerCase();
  const name = (o.carrier_name || 'Carrier').toUpperCase();
  const bg = o.brand_color || '#1e3a5f';
  if (o.carrier_logo && o.carrier_logo.startsWith('/')) {
    return `<div class="offer-brand" style="background:${bg};">
      <img src="${o.carrier_logo}" alt="${name}" onerror="this.style.display='none';this.parentNode.innerHTML='<span style=color:white;font-weight:800;font-size:18px;letter-spacing:1px>${name}</span>'">
    </div>`;
  }
  return `<div class="offer-brand" style="background:${bg};">
    <span style="color:white;font-weight:800;font-size:18px;letter-spacing:1px">${name}</span>
  </div>`;
}

function renderOffer(o) {
  const directTag = o.is_direct
    ? '<span class="tag direct">مباشر</span>'
    : '<span class="tag ts">T/S</span>';
  return `<div class="offer">
    ${carrierLogoHTML(o)}
    <div class="offer-body">
      <div>
        <span class="offer-price">$${Number(o.price).toLocaleString()}</span>
        <span class="offer-currency">${o.currency || 'USD'}</span>
      </div>
      <div class="offer-meta">
        ${directTag}
        <span class="tag">${o.transit_days} يوم</span>
        ${o.country ? `<span class="tag">${o.country}</span>` : ''}
      </div>
      <div class="offer-row"><span>المسار</span><span>${o.route}</span></div>
      <div class="offer-row"><span>الإقلاع (ETD)</span><span>${o.etd || '—'}</span></div>
      <div class="offer-row"><span>الوصول (ETA)</span><span>${o.eta || '—'}</span></div>
      <div class="offer-row"><span>السفينة</span><span>${o.vessel || '—'}</span></div>
      <div class="offer-row"><span>أيام مجانية</span><span>${o.free_days || 10}</span></div>
      <div class="offer-row"><span>صالح حتى</span><span>${o.validity_until || '—'}</span></div>
      <button class="book-btn" onclick="bookOffer(${JSON.stringify(o).replace(/"/g, '&quot;')})">احجز هذا العرض</button>
    </div>
  </div>`;
}

function renderOffers() {
  const sorted = [...allOffers].sort((a, b) => {
    if (currentSort === 'price') return a.price - b.price;
    if (currentSort === 'transit_days') return a.transit_days - b.transit_days;
    return (a.carrier_name || '').localeCompare(b.carrier_name || '');
  });
  offersEl.innerHTML = sorted.map(renderOffer).join('');
  offerCountEl.textContent = sorted.length;
}

document.querySelectorAll('.sort button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.sort button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentSort = btn.dataset.sort;
    renderOffers();
  });
});

async function bookOffer(offer) {
  if (!confirm(`تأكيد الحجز مع ${offer.carrier_name} بسعر $${offer.price}؟`)) return;
  try {
    // Create a quote then immediately book it
    const quote = await flxApi.quotes.create({
      origin: form.originPort.value,
      destination: form.destinationPort.value,
      carrier: offer.carrier_name,
      container: form.containerType.value,
      price: offer.price,
      valid_until: offer.validity_until || new Date(Date.now() + 7 * 86400000).toISOString().slice(0, 10),
    });
    const booked = await flxApi.quotes.book(quote.id);
    alert(`✅ تم الحجز!\nرقم الشحنة: ${booked.shipment.id}\nرقم الفاتورة: ${booked.invoice.id}`);
    window.location.href = '/dashboard.html';
  } catch (e) {
    alert('فشل الحجز: ' + e.message);
  }
}
window.bookOffer = bookOffer;

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  submitBtn.disabled = true;
  setStatus('🔍 جاري البحث عن أفضل العروض من 30 خط ملاحي... ', 'loading');
  statusEl.innerHTML += '<span class="spinner"></span>';

  const fd = new FormData(form);
  const body = Object.fromEntries(fd.entries());
  body.hazardous = fd.has('hazardous');
  body.numContainers = parseInt(body.numContainers) || 1;
  if (body.cargoWeightKg) body.cargoWeightKg = parseFloat(body.cargoWeightKg);
  if (body.cargoVolumeM3) body.cargoVolumeM3 = parseFloat(body.cargoVolumeM3);

  try {
    const t0 = Date.now();
    const result = await fetch('/api/v1/rates/search', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${flxApi.isAuthenticated() ? (localStorage.getItem('flx_access_token') || Object.keys(localStorage).filter(k => k.startsWith('sb-') && k.endsWith('-auth-token')).map(k => { try { return JSON.parse(localStorage.getItem(k))?.access_token; } catch { return null; } }).find(Boolean)) : ''}`,
      },
      body: JSON.stringify(body),
    });
    if (!result.ok) {
      if (result.status === 401) {
        setStatus('⚠️ يجب تسجيل الدخول أولاً', 'error');
        setTimeout(() => location.href = '/login.html', 1500);
        return;
      }
      throw new Error(`HTTP ${result.status}`);
    }
    const data = await result.json();
    allOffers = data.offers || [];

    const ms = Date.now() - t0;
    setStatus(`✅ تم العثور على ${allOffers.length} عرض (${data.source}) في ${ms}ms`, 'success');
    summaryEl.textContent = `${form.originPort.options[form.originPort.selectedIndex].text} → ${form.destinationPort.options[form.destinationPort.selectedIndex].text} · ${form.containerType.value}`;
    resultsCard.style.display = 'block';
    renderOffers();
    resultsCard.scrollIntoView({ behavior: 'smooth' });
  } catch (err) {
    setStatus('❌ فشل البحث: ' + err.message, 'error');
  } finally {
    submitBtn.disabled = false;
  }
});

// Auto-redirect to login if not authenticated
window.addEventListener('load', () => {
  if (!flxApi.isAuthenticated()) {
    setStatus('⚠️ سجّل دخولك لطلب الأسعار', 'error');
  }
});
</script>
</body>
</html>
